name: daily

on:
  schedule:
    # Due cron UTC per gestire DST (CET/CEST). Il guard interno evita doppie esecuzioni.
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore SQLite state cache
        uses: actions/cache@v4
        with:
          path: data/state.sqlite3
          key: state-sqlite-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            state-sqlite-${{ runner.os }}-${{ github.ref_name }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ TEST IMMEDIATO: se questo ping NON arriva, il problema è token/chat_id/permessi
      - name: Telegram ping (MANUAL)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "Sending ping to TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=Ping da GitHub Actions ✅" \
            -d "disable_notification=false"
          echo ""

      # ✅ MANUALE: quando clicchi "Run workflow", esegue sempre (senza guard orario)
      - name: Run daily once (MANUAL - send always)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          mkdir -p data
          python run.py --once --config config.example.yaml --sources sources.yaml --log-level INFO

      # ✅ SCHEDULE: invia solo alle 08:00 Europe/Rome (guard)
      - name: Run daily once (SCHEDULED - guarded by local time)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          mkdir -p data
          python run.py --once --config config.example.yaml --sources sources.yaml --expect-local-time 08:00 --log-level INFO
