name: daily

on:
  schedule:
    # Due cron UTC per gestire DST (CET/CEST).
    # Il guard interno evita doppie esecuzioni e invia solo alle 08:00 Europe/Rome.
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore SQLite state cache
        uses: actions/cache@v4
        with:
          path: data/state.sqlite3
          key: state-sqlite-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            state-sqlite-${{ runner.os }}-${{ github.ref_name }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ MANUALE: quando clicchi "Run workflow" deve inviare sempre (senza guard sull'orario)
      - name: Run daily once (MANUAL: send always)
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p data
          python run.py --once --config config.example.yaml --sources sources.yaml --log-level INFO

      # ✅ SCHEDULE: invia solo se ora locale Europe/Rome è 08:00 (evita doppioni con i due cron UTC)
      - name: Run daily once (SCHEDULED: guarded by local time)
        if: github.event_name != 'workflow_dispatch'
        run: |
          mkdir -p data
          python run.py --once --config config.example.yaml --sources sources.yaml --expect-local-time 08:00 --log-level INFO
